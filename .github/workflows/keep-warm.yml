name: Keep Render backend warm

# Pings the deployed /health every 10 minutes so the Render free instance never
# spins down (it sleeps after ~15 min idle). /health is rate-limit-exempt and does
# only in-memory checks, so this is negligible load. Runs on GitHub's infra — no
# machine of yours needs to stay on.
#
# Caveats: GitHub may delay scheduled runs by a few minutes under load, and it
# disables scheduled workflows after 60 days with no repo activity (just push to
# re-enable). For maximum reliability, also/instead use cron-job.org or UptimeRobot.

on:
  schedule:
    # Every 5 min. GitHub cron is best-effort (can be delayed several minutes
    # under load), so we ping more often than the 15-min sleep window. The
    # backend's own self-ping (selfPing.service.js) is the primary keep-alive;
    # this is a backup layer.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl -fsS --max-time 70 https://indus-system.onrender.com/health \
            && echo "  ok $(date -u)" \
            || echo "ping failed (instance may be cold-starting) $(date -u)"
