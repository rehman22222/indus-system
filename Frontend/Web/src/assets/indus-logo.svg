  </g>

  <!-- wordmark -->
  <text x="86" y="40" font-size="25" font-weight="800" fill="#1B365D" letter-spacing="0.5">INDUS HOSPITAL <tspan fill="#BE1E2D" font-weight="800">&amp;</tspan></text>
  <rect x="88" y="48" width="244" height="3" fill="#BE1E2D"/>
