<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="INDUS Hospital">
  <defs>
    <linearGradient id="bg" x1="14" y1="6" x2="86" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E5404C"/>
      <stop offset=".55" stop-color="#C11F2C"/>
      <stop offset="1" stop-color="#7E1019"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30" cy="22" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".32"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hg" x1="50" y1="24" x2="50" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#FFE7EB"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="96" height="96" rx="27" fill="url(#bg)"/>
  <rect x="2" y="2" width="96" height="96" rx="27" fill="url(#sheen)"/>

  <!-- faint heartbeat pulse — subtle medical cue -->
  <path d="M16 64 H35 l4 -11 6 22 5 -16 4 8 H84" fill="none"
        stroke="#ffffff" stroke-opacity=".12" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- soft drop shadow of the H -->
  <g fill="#56090F" opacity=".22" transform="translate(0,1.4)">
    <rect x="28" y="25.5" width="13.5" height="49" rx="5"/>
    <rect x="58.5" y="25.5" width="13.5" height="49" rx="5"/>
    <rect x="28" y="43" width="44" height="13.5" rx="4"/>
  </g>

  <!-- INDUS "H" monogram -->
  <g fill="url(#hg)">
    <rect x="28" y="24.5" width="13.5" height="49" rx="5"/>
    <rect x="58.5" y="24.5" width="13.5" height="49" rx="5"/>
    <rect x="28" y="42" width="44" height="13.5" rx="4"/>
  </g>

  <!-- glass edge -->
  <rect x="2.8" y="2.8" width="94.4" height="94.4" rx="26.4" fill="none"
        stroke="#ffffff" stroke-opacity=".18" stroke-width="1.4"/>
</svg>
